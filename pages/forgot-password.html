<!DOCTYPE html><html><body><h2>Forgot Password</h2><input id='u' placeholder='Username'><input id='p' placeholder='New Password'><button onclick='r()'>Reset</button><script src='../js/config.js'></script><script src='../js/storage.js'></script><script>function r(){let us=Storage.get(CONFIG.KEYS.USERS,[]);let u=document.getElementById('u').value;let p=document.getElementById('p').value;let f=us.find(x=>x.username===u);if(f){f.password=p;Storage.set(CONFIG.KEYS.USERS,us);alert('Updated');location='../index.html';}else alert('User not found')}</script></body></html>
