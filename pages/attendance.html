<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Attendance Management</title>
<link rel="icon" type="image/png" href="../assets/images/favicon.png">


    <!-- CSS -->
    <link rel="stylesheet" href="../css/sidebar.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="../css/attendance.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Header -->
        <section class="attendance-header">

            <div class="header-left">
                <h2>Attendance</h2>
                <p>Attendance Management System</p>
            </div>

            <div class="header-right">

                <button
                    class="mark-btn"
                    id="markAttendanceBtn"
                >
                    <i class="fa-solid fa-plus"></i>
                    Mark Attendance
                </button>

            </div>

        </section>


        <!-- Dashboard Cards -->
        <section class="cards-grid">

            <!-- Present -->
            <div class="dashboard-card">

                <div class="card-icon green">
                    <i class="fa-solid fa-user-check"></i>
                </div>

                <div class="card-info">
                    <span>PRESENT</span>
                    <h3>0</h3>
                </div>

            </div>

            <!-- Half Day -->
            <div class="dashboard-card">

                <div class="card-icon orange">
                    <i class="fa-solid fa-person-half-dress"></i>
                </div>

                <div class="card-info">
                    <span>HALF DAY</span>
                    <h3>0</h3>
                </div>

            </div>

            <!-- Full Leave -->
            <div class="dashboard-card">

                <div class="card-icon red">
                    <i class="fa-solid fa-user-xmark"></i>
                </div>

                <div class="card-info">
                    <span>FULL LEAVE</span>
                    <h3>0</h3>
                </div>

            </div>

            <!-- Week Off -->
            <div class="dashboard-card">

                <div class="card-icon purple">
                    <i class="fa-solid fa-calendar-week"></i>
                </div>

                <div class="card-info">
                    <span>WEEK OFF</span>
                    <h3>0</h3>
                </div>

            </div>

            <!-- OT Hours -->
            <div class="dashboard-card">

                <div class="card-icon blue">
                    <i class="fa-solid fa-clock"></i>
                </div>

                <div class="card-info">
                    <span>OT HOURS</span>
                    <h3>0</h3>
                </div>

            </div>

            <!-- Late Logins -->
            <div class="dashboard-card">

                <div class="card-icon orange">
                    <i class="fa-solid fa-user-clock"></i>
                </div>

                <div class="card-info">
                    <span>LATE LOGINS</span>
                    <h3>0</h3>
                </div>

            </div>

        </section>


        <!-- Attendance Records -->
        <section class="table-section">

            <div class="section-top">

                <div class="title-row">
                    <h3>Attendance Records</h3>
                </div>

                <div class="filters-row">

                    <div class="action-bar">

                        <!-- Search -->
                        <div class="search-box">

                            <i class="fa-solid fa-magnifying-glass"></i>

                            <input
                                type="text"
                                placeholder="Search Emp ID / Employee Name"
                            />

                        </div>

                        <!-- Date -->
                        <input
                            class="date-picker"
                            type="date"
                        />

                    </div>

                </div>

            </div>


            <!-- Table -->
            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Emp ID</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Dept</th>
                            <th>Login</th>
                            <th>Break</th>
                            <th>Working Hours</th>
                            <th>OT Hours</th>
                            <th>Logout</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="attendanceTableBody"></tbody>

                </table><div class="pagination"><button>Prev</button><button>1</button><button>2</button><button>Next</button></div>

            </div>

        </section>


        <!-- Attendance Modal -->
<div
    class="modal-overlay"
    id="attendanceModal"
>

    <div class="attendance-modal">

        <!-- Header -->
        <div class="modal-head">

            <h3>
                Mark Attendance
            </h3>

            <button
                id="closeAttendanceModal"
                type="button"
            >
                &times;
            </button>

        </div>


        <!-- Form -->

        <form id="attendanceForm">

           
            <div class="modal-body">

    <!-- Employee + Date -->

    <div class="form-row">

        <div class="input-group">

            <label>
                Employee
            </label>

            <select id="employeeSelect">

                <option value="">
                    Select Employee ID / Name
                </option>

            </select>

        </div>

        <div class="input-group">

            <label>
                Date
            </label>

            <input
                id="attendanceDateModal"
                type="date"
            >

        </div>

    </div>


    <!-- Login + Logout -->

    <div class="form-row">

        <div class="input-group">

            <label>
                Login Time
            </label>

            <input
                id="loginTimeModal"
                type="time"
            >

        </div>

        <div class="input-group">

            <label>
                Logout Time
            </label>

            <input
                id="logoutTimeModal"
                type="time"
            >

        </div>

    </div>


    <!-- Breaks -->

    <div class="break-section">

        <h4>
            Breaks
        </h4>

        <div
            id="breakContainer"
        ></div>

        <button
            class="mini-btn"
            id="addBreakBtn"
            type="button"
        >
            + Add Break
        </button>

    </div>


    <!-- Status + OT Mode -->

<div class="form-row">

    <!-- Status -->

    <div class="input-group">

        <label>
            Status
        </label>

        <select id="attendanceType">

            <option>
                Present
            </option>

            <option>
                Leave
            </option>

            <option>
                Week Off
            </option>

            <option>
                Holiday
            </option>

            <option>
                Half Day
            </option>

        </select>

    </div>


    <!-- OT Mode -->

    <div class="input-group">

         <label>OT Mode</label>

   <select id="benefitType">
        <option value="">
            Select OT Mode
       </option>

        <option value="Pay">
            Extra Pay
        </option>

       <option value="Credit">
        +1 Credit Bonus
       </option>

    </select>

</div>

</div>


<!-- Remarks -->

<div
    class="
    input-group
    remarks-group
    "
>

    <label>
        Remarks
    </label>

    <textarea
        id="remarks"
        placeholder="Remarks"
    ></textarea>

</div>

</div>


<!-- Footer -->

<div
    class="modal-actions"
>

    <!-- Save -->

    <button
        class="save-btn"
        id="saveAttendanceBtn"
        type="button"
    >
        Save
    </button>

    <!-- Reset -->

    <button
        class="reset-btn"
        id="resetAttendanceBtn"
        type="reset"
    >
        Reset
    </button>

    <!-- Cancel -->

    <button
        class="mini-btn"
        id="closeBtn2"
        type="button"
    >
        Cancel
    </button>

</div>

</form>

</div>

</div>

</main>


<!-- JS -->

<script src="../js/config.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/permissions.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/attendance.js"></script>

</body>

</html>
